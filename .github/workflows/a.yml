name: Twitch Register

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: '挂宝服务器 IP（只需填 IP，脚本自动拼 http://IP:5000）'
        required: true
        default: '64.81.112.97'
        type: string
      job_count:
        description: '启动的 job 数量（1-256，每 job 各注册 45 个账号）'
        required: true
        default: '3'
        type: string

jobs:
  # 预处理：用 Python 生成 matrix JSON
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job_list: ${{ steps.gen.outputs.job_list }}
    steps:
      - name: Generate job list
        id: gen
        shell: bash
        env:
          JOB_COUNT: ${{ github.event.inputs.job_count || '3' }}
        run: |
          python3 -c "
          import json, os
          n = max(1, min(256, int(os.environ['JOB_COUNT'])))
          arr = [f'job-{i}' for i in range(n)]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('job_list=' + json.dumps(arr) + chr(10))
          print('job_list=' + json.dumps(arr))
          "

  # 实际注册：matrix 并行，每个 job 内部 3 worker × 15 = 45 个账号
  register:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 256
      matrix:
        job_index: ${{ fromJSON(needs.prepare.outputs.job_list) }}

    steps:
      - name: Checkout public repo (this)
        uses: actions/checkout@v4

      - name: Checkout private source repo
        uses: actions/checkout@v4
        with:
          repository: xbox-cn/New_Tw_Auto_Reg
          token: ${{ secrets.PRIVATE_REPO_ACCESS_KEY }}
          path: src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Download CloakBrowser binary
        shell: pwsh
        run: |
          Write-Host "Downloading CloakBrowser chromium binary..."
          python -m cloakbrowser install
          Write-Host "--- Verifying chrome.exe ---"
          $exe = python -c "import sys; sys.path.insert(0,'src'); from config_helpers import resolve_chrome_executable; print(resolve_chrome_executable())"
          Write-Host "chrome.exe path: $exe"
          if (-not (Test-Path $exe)) { throw "chrome.exe not found at $exe" }
          Write-Host "CloakBrowser ready."

      - name: Run registration (job ${{ matrix.job_index }})
        shell: pwsh
        env:
          NO_HEADLESS: 'true'
          PYTHONUTF8: '1'
          JOB_INDEX: ${{ matrix.job_index }}
          SERVER_IP: ${{ github.event.inputs.server_ip || '64.81.112.97' }}
        run: |
          Write-Host "=== Job ${{ matrix.job_index }}: 3 worker 并发，每 worker 15 个，共 45 个账号 ==="
          Write-Host "=== 上传到 http://${{ github.event.inputs.server_ip || '64.81.112.97' }}:5000 ==="
          cd src
          python run.py
